version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: lab-postgres
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: lab-backend
    environment:
      DATABASE_URL: postgresql://postgres:mypassword@postgres:5432/mydb
      PORT: 5000
    depends_on:
      - postgres
    restart: always

  frontend:
    build: ./frontend
    container_name: lab-frontend
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: lab-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
